<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bistro Bliss</title>
    <link rel="icon" href="images/icon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/font.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header>
      <div class="top-bar">
        <div class="contacts-class">
          <div class="contact-bar">
            <div class="for-contacts">
              <div class="phone-number">
                <i class="fa-solid fa-phone"></i>
                <a href="tel:(414) 857 - 0107">(414) 857 - 0107</a>
              </div>
              <div class="email">
                <i class="fa-regular fa-envelope"></i>
                <a href="mailto:yummy@bistrobliss">yummy@bistrobliss</a>
              </div>
            </div>
            <div class="social-icons">
              <a href="https://x.com/"><i class="fa-brands fa-twitter"></i></a>
              <a href="https://www.facebook.com/"
                ><i class="fa-brands fa-facebook-f"></i
              ></a>
              <a href="https://www.instagram.com/"
                ><i class="fa-brands fa-instagram"></i
              ></a>
              <a href="https://github.com/"
                ><i class="fa-brands fa-github"></i
              ></a>
            </div>
          </div>
        </div>
      </div>
      <div class="bottom-bar">
        <div class="menu-container">
          <div class="burger-bar">
            <i class="fa-solid fa-bars"></i>
          </div>
          <a class="logo" href="index.html"
            ><img src="images/logo.svg" alt="logo"
          /></a>
          <nav class="navigation">
            <ul class="ul-list">
              <li><a href="#">Home</a></li>
              <li><a href="#">About</a></li>
              <li><a href="#">Menu</a></li>
              <li><a href="#">Pages</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </nav>
          <button class="button-class"><a href="#">Book A Table</a></button>
        </div>
      </div>
    </header>
    <main>
      <!--პირველი სექცია-->
      <section>
        <div class="bg-photo">
          <div class="main-text">
            <div class="text-side">
              <h1>Best food for your taste</h1>
              <h4>
                Discover delectable cuisine and unforgettable moments in our
                welcoming, culinary haven.
              </h4>
            </div>
            <div class="buttons-side">
              <button>Book A Table</button>
              <button>Explore Menu</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
